<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="/Images/favicon.ico">
    <title>Học HTML</title>
    <base href="https://ff1e00.github.io/">
    <style>
      * {
        background-color: #faebd7;
        color: #c1554e;
        font-family: Georgia, serif;
      }
      body {
        margin: 0;
        padding: 0;
      }
      header {
        margin-bottom: 100px;
      }
      header img {
        width: 100%;
      }
      main {
        min-height: 100vh;
      }
      h1 {
        text-align: center;
      }
      @media only screen and (min-width: 800px) {
        .multicolumn {
          column-count: 3;
          column-gap: 20px;
        }
      }
      .multicolumn {
        margin: auto;
      }
      .multicolumn div {
        break-inside: avoid;
        padding: 10px;
        margin: 10px auto;
        width: 90%;
      }
      .multicolumn div, .multicolumn div * {
        background-color: #ffc1b3;
      }
      .multicolumn div:hover, .multicolumn div:hover * {
        background-color: #fe8a7f;
        color: #ffffff;
      }
      a.no-underline {
        text-decoration: none;
      }
      footer {
        padding-top: 20px;
        padding-bottom: 20px;
        margin-top: 100px;
        text-align: center;
        font-size: 75%;
      }
      footer, footer * {
        background-color: #c1554e;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="/Images/header.jpg" alt="HTML code">
    </header>
    <main>
      <h1>Danh sách website</h1>
      <div class="multicolumn">
        <a href="html-tags" class="no-underline">
          <div>
            <h2>Một số trang web về HTML/CSS</h2>
          </div>
        </a>
      </div>
    </main>
    <footer>
      <a href="">ff1e00.github.io</a>
      <nav>
        Hosting: <a href="https://github.com/">GitHub</a> |
        Ảnh: <a href="https://pixabay.com/">Pixabay</a>
      </nav>
    </footer>
  </body>
</html>
