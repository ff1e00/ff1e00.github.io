<!DOCTYPE html>
<html lang="en"> <!--Thẻ gốc-->
  <head> <!--Phần tử con đầu tiên của <html>, chứa thông tin về trang web-->
    <meta charset="UTF-8"> <!--Nằm trong <head>, cung cấp siêu dữ liệu-->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML tags</title> <!--Tiêu đề trang web-->
    <base href="https://ff1e00.github.io/"> <!--URL cơ sở của các URL tương đối. Chỉ được có 1 <base> trong 1 tài liệu. Xem VD ở dưới-->
    <style>
      * {
        color: #8b0000;
        background-color: #faebd7;
        font-family: Georgia, serif;
        font-size: 16px;
      }
    </style> <!--Định dạng CSS-->
  </head>
  <body>
    <a href="">Trang chủ</a> <!--"" tương đương với "https://ff1e00.github.io/"-->
  </body>
</html>
